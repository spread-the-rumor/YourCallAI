<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Meeting Detected</title>
  <style>
    /* Glassmorphism — palette #1C1C1C / #302A18 / #FDE4C3 / #F6F6F6 */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; }
    html, body { background: transparent; overflow: hidden; }
    .card {
      margin: 8px; padding: 14px 16px; border-radius: 18px;
      background: linear-gradient(135deg, rgba(48, 42, 24, 0.82), rgba(28, 28, 28, 0.9));
      border: 1px solid rgba(253, 228, 195, 0.16);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      color: #F6F6F6;
      box-shadow: 0 10px 34px rgba(0, 0, 0, 0.5);
      -webkit-app-region: drag;
    }
    .row { display: flex; align-items: center; gap: 12px; }
    .logo { width: 34px; height: 34px; border-radius: 22%; flex: none; }
    .text { flex: 1; min-width: 0; }
    .title { font-size: 13px; font-weight: 700; }
    .sub { font-size: 11px; color: rgba(246, 246, 246, 0.6); margin-top: 2px; max-width: 170px;
           white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    button { -webkit-app-region: no-drag; cursor: pointer; border: none; border-radius: 999px; font-size: 12px; }
    #start { background: #FDE4C3; color: #2b2113; font-weight: 700; padding: 8px 16px; }
    #start:hover { filter: brightness(1.08); }
    #dismiss { background: transparent; color: rgba(246, 246, 246, 0.55); font-size: 15px; padding: 4px 8px; border-radius: 50%; }
    #dismiss:hover { color: #F6F6F6; background: rgba(255, 255, 255, 0.08); }
  </style>
</head>
<body>
  <div class="card">
    <div class="row">
      <img class="logo" id="popup-logo" alt="">
      <div class="text">
        <div class="title">Meeting detected</div>
        <div class="sub" id="detail">—</div>
      </div>
      <button id="start">● Start Recording</button>
      <button id="dismiss" title="Dismiss">✕</button>
    </div>
  </div>
</body>
</html>
